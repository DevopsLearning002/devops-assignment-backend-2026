name: Deploy backend application to AWS

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ankitd002/devops-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  deploy-to-aws-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on AWS EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest

            docker stop devops-backend-container || true
            docker rm -f devops-backend-container || true

            docker run -d \
              --name devops-backend-container \
              -p 8080:8080 \
              -e MONGODB_URL='${{ secrets.MONGODB_URL }}' \
              -e PORT='${{ secrets.PORT }}' \
              ${{ env.IMAGE_NAME }}:latest