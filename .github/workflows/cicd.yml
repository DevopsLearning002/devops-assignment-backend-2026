name: deploy backend application
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: create .env file
        run: |
          echo "MONGODB_URL=${{ secrets.MONGODB_URL }}" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env
      
      - name: login to docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push docker image
        run: |
          docker build -t ankitd002/devops-backend:latest .
          docker push ankitd002/devops-backend:latest 
      
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: pull docker image
        run: |
          docker pull ankitd002/devops-backend:latest

      - name: stop and remove existing container
        run: |
          docker stop devops-backend-container || true
          docker rm -f devops-backend-container || true  

      - name: run new container
        run: |
          docker run -d -p 8080:8080 --name devops-backend-container ankitd002/devops-backend:latest
          



    